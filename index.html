<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plus Five</title>
    
    <link rel="icon" href="image_73.png">
    <link rel="apple-touch-icon" href="image_73.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 60px 20px; /* 余白を広げて圧迫感を解消 */
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 600; margin-bottom: 40px; letter-spacing: 0.5px; }

        .record-info {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Timer Display: サイズ調整と隠し機能用のカーソル設定 */
        .timer-display {
            font-size: 6rem; /* 8remから縮小して抜け感を作成 */
            font-weight: 900;
            line-height: 1.2;
            margin: 30px 0;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Controls: ボタンを2つに集約 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .adj-btn {
            background: var(--accent);
            border: none;
            flex: 1;
            max-width: 100px;
            height: 55px;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--main);
            cursor: pointer;
            -webkit-appearance: none;
            touch-action: manipulation; /* ズーム防止 */
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            padding: 22px;
            background: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s;
            touch-action: manipulation; /* ズーム防止 */
        }
        .action-btn:active { transform: scale(0.98); }
        .action-btn.running { background: #ff4444; }

        footer { margin-top: 60px; font-size: 11px; color: #aaa; line-height: 1.8; }
        footer a { color: inherit; text-decoration: none; }
        .footer-btns { margin-top: 40px; }
        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 12px 25px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 12px;
            touch-action: manipulation;
        }
        .home-btn {
            display: block; width: 60%; margin: 0 auto; background: var(--accent);
            color: var(--main); border: none; padding: 10px;
            border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
            touch-action: manipulation;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Plus Five</h1>
    <p class="subtitle">One Step Further.</p>

    <div class="record-info" id="lastRecordText">Last: 0s</div>
    
    <div class="timer-display" id="timerDisplay" onclick="adjust(1)">35</div>

    <div class="controls">
        <button class="adj-btn" onclick="adjust(-5)">−5s</button>
        <button class="adj-btn" onclick="adjust(5)">+5s</button>
    </div>

    <button class="action-btn" id="actionBtn" onclick="toggleTimer()">START</button>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div><a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3>📱 Install</h3>
        <p>Add to your home screen.</p>
        <p>🍏 <strong>iPhone (Safari):</strong><br>Tap Share, then Add to Home Screen.</p>
        <p>🤖 <strong>Android (Chrome):</strong><br>Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    let lastRecord = parseInt(localStorage.getItem('plusFive_last')) || 30;
    let currentSeconds = lastRecord + 5;
    let initialSeconds = currentSeconds;
    let timer = null;
    let audioCtx = null;

    const display = document.getElementById('timerDisplay');
    const actionBtn = document.getElementById('actionBtn');
    const lastRecordText = document.getElementById('lastRecordText');

    function init() {
        updateDisplay();
        lastRecordText.textContent = `Last: ${lastRecord}s`;
    }

    function updateDisplay() {
        display.textContent = currentSeconds;
    }

    function adjust(val) {
        if (timer) return;
        currentSeconds = Math.max(1, currentSeconds + val);
        initialSeconds = currentSeconds;
        updateDisplay();
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function beep(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function toggleTimer() {
        initAudio();
        if (timer) {
            stopTimer();
        } else {
            startTimer();
        }
    }

    function startTimer() {
        actionBtn.textContent = 'STOP';
        actionBtn.classList.add('running');
        timer = setInterval(() => {
            currentSeconds--;
            updateDisplay();
            if (currentSeconds <= 0) {
                finishTimer();
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timer);
        timer = null;
        currentSeconds = initialSeconds;
        updateDisplay();
        actionBtn.textContent = 'START';
        actionBtn.classList.remove('running');
    }

    function finishTimer() {
        clearInterval(timer);
        timer = null;
        
        lastRecord = initialSeconds;
        localStorage.setItem('plusFive_last', lastRecord);
        lastRecordText.textContent = `Last: ${lastRecord}s`;
        
        currentSeconds = lastRecord + 5;
        initialSeconds = currentSeconds;
        updateDisplay();

        actionBtn.textContent = 'START';
        actionBtn.classList.remove('running');

        beep(880, 0.5);
        setTimeout(() => beep(440, 0.5), 200);
        setTimeout(() => beep(880, 0.5), 400);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    init();
</script>

</body>
</html>
